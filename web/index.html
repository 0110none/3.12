<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>多摄像头人脸跟踪系统 · 控制台</title>
  <meta name="description" content="专业系统风格的监控与告警控制台界面" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="top-nav" role="banner">
      <div class="brand">多摄像头人脸跟踪系统</div>
      <nav class="top-nav-actions" aria-label="主导航">
        <button class="ghost-btn">帮助文档</button>
        <button class="ghost-btn">系统设置</button>
        <button class="primary-btn">新建告警策略</button>
      </nav>
    </header>

    <div class="workspace">
      <aside class="side-nav" aria-label="侧边导航">
        <h2>功能导航</h2>
        <ul>
          <li class="active">实时监控</li>
          <li>人脸库管理</li>
          <li>历史记录</li>
          <li>告警中心</li>
          <li>设备管理</li>
        </ul>
      </aside>

      <main class="main-panel">
        <section class="toolbar" aria-label="功能操作区">
          <div class="toolbar-left">
            <input id="keyword" type="text" placeholder="输入姓名 / 摄像头名称" />
            <select id="cameraFilter">
              <option value="all">全部摄像头</option>
              <option value="A-01">A-01 大门</option>
              <option value="B-03">B-03 走廊</option>
            </select>
            <select>
              <option>过去 24 小时</option>
              <option>过去 7 天</option>
              <option>过去 30 天</option>
            </select>
          </div>
          <div class="toolbar-right">
            <button class="secondary-btn" id="refreshBtn">刷新</button>
            <button class="primary-btn" id="exportBtn">导出记录</button>
          </div>
        </section>

        <section class="content-grid" aria-label="主内容区">
          <article class="kpi-card">
            <h3>在线摄像头</h3>
            <p>18 / 20</p>
            <small>较昨日 +2</small>
          </article>
          <article class="kpi-card">
            <h3>今日识别事件</h3>
            <p>1,268</p>
            <small>高优先级 27 条</small>
          </article>
          <article class="kpi-card">
            <h3>平均识别延迟</h3>
            <p>162 ms</p>
            <small>符合性能基线</small>
          </article>

          <section class="table-card">
            <div class="table-header">
              <h3>最新识别记录</h3>
              <span id="tableHint">支持按时间排序</span>
            </div>
            <table>
              <thead>
                <tr>
                  <th><button id="sortTime" class="sort-btn">时间</button></th>
                  <th>姓名</th>
                  <th>摄像头</th>
                  <th>置信度</th>
                  <th>状态</th>
                </tr>
              </thead>
              <tbody id="recordBody"></tbody>
            </table>
            <div class="pagination">
              <button id="prevPage" class="secondary-btn">上一页</button>
              <span id="pageInfo">第 1 页</span>
              <button id="nextPage" class="secondary-btn">下一页</button>
            </div>
          </section>
        </section>

        <section class="status-bar" aria-live="polite">
          <span id="statusText">系统运行正常，暂无未处理错误。</span>
          <button id="clearNotice" class="ghost-btn">清除提示</button>
        </section>
      </main>
    </div>
  </div>

  <dialog id="confirmDialog">
    <p>确认执行导出操作？导出时间可能持续 10~20 秒。</p>
    <div class="dialog-actions">
      <button id="cancelExport" class="secondary-btn">取消</button>
      <button id="confirmExport" class="primary-btn">确认导出</button>
    </div>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
